<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIATRI · environmental risk map</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome 6 -->
             <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #d4e3f0;
        }
        /* map fullscreen */
        #map {
            flex: 1;
            width: 100%;
            background: #c4dcec;
            z-index: 1;
        }
        /* overlay header */
        .map-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 28px;
            border-radius: 60px;
            box-shadow: 0 10px 30px -10px #1e3f5f;
            border: 1px solid #ffffff90;
            pointer-events: all;
        }
        .map-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #114267;
        }
        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
            color: #2a5d86;
        }
        .badge {
            background: #2a5d86;
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .layer-toggle {
            display: flex;
            gap: 8px;
            background: #b0c7d8;
            border-radius: 40px;
            padding: 4px;
        }
        .layer-btn {
            background: transparent;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            color: #2c618a;
            cursor: pointer;
            transition: 0.1s;
        }
        .layer-btn.active {
            background: white;
            box-shadow: 0 4px 10px #c1d7ee;
            color: #0d3860;
        }

        /* side panel (collapsible) */
        .side-panel {
            position: absolute;
            top: 100px;
            left: 24px;
            width: 280px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 22px 20px;
            box-shadow: 0 20px 40px -15px #193d5b;
            border: 1px solid #ffffff;
            z-index: 5;
            pointer-events: all;
            height:fit-content
        }
        .panel-section {
            margin-bottom: 15px;
        }
        .panel-title {
            font-weight: 700;
            color: #164e79;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }
        .filter-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #2a6b9e;
        }
        .time-option {
            background: #daeaf9;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 500;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .time-option.active {
            background: #226797;
            color: white;
        }

        /* alert banner */
        .alert-banner {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #f95d3b;
            color: white;
            padding: 16px 38px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 20px 40px #cd482e80;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            border: 2px solid #ffffff80;
        }
        .alert-banner i {
            font-size: 1.5rem;
        }

        /* custom popup */
        .node-popup {
            font-family: 'Inter', sans-serif;
            min-width: 240px;
        }
        .popup-header {
            font-weight: 700;
            color: #0d3e5f;
            border-bottom: 1px solid #c9ddef;
            padding-bottom: 8px;
        }
        .popup-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.9rem;
        }
        .popup-footer {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .popup-btn {
            background: #e2effa;
            border: none;
            padding: 10px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #1d5982;
            cursor: pointer;
            flex: 1;
            text-align: center;
            font-size: 0.8rem;
        }
        .spark {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .spark span {
            width: 8px;
            height: 20px;
            background: #5fa3d1;
            border-radius: 4px;
        }

        /* mobile responsive */
        @media (max-width: 700px) {
            .side-panel { width: 220px; padding: 16px; left: 12px; top: 100px; }
            .map-header { flex-direction: column; align-items: start; gap: 12px; }
            .alert-banner { font-size: 0.9rem; padding: 12px 24px; }
        }
        .kembali:hover{
            background-color: #2674ab !important;
        }
    </style>
    <script src= "https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.0/sweetalert.min.js">
  </script>
</head>
<body>
    <!-- MAP CONTAINER  -->
    <div id="map"></div>

    <!-- OVERLAY HEADER -->
    <div class="map-header">
    <a class="kembali text-decoration-none fw-bold btn rounded-3 px-3 text-light" style="background-color: #0f3f62;" href="index.html"><div>Back</div></a>

        <h1><i class="fa-regular fa-map"></i> Environmental Risk Map</h1>
        <div class="header-right">
            <span class="badge"><i class="fa-regular fa-clock"></i> Updated: 22 Feb 14:30</span>
            <div class="layer-toggle">
                <button class="layer-btn active" id="btnHeatmap"><i class="fa-regular fa-fire"></i> Heat</button>
                <button class="layer-btn" id="btnNodes"><i class="fa-regular fa-microchip"></i> Nodes</button>
                <button class="layer-btn" id="btnShelters"><i class="fa-regular fa-tent"></i> Shelters</button>
            </div>
        </div>
    </div>

    <!-- SIDE FILTER PANEL -->
    <div class="side-panel">
        <div class="panel-section">
            <div class="panel-title"><i class="fa-regular fa-sliders"></i> Risk filter</div>
            <div class="filter-item"><input type="checkbox" id="airborne" checked> <label for="airborne">Airborne</label></div>
            <div class="filter-item"><input type="checkbox" id="waterborne" checked> <label for="waterborne">Waterborne</label></div>
            <div class="filter-item"><input type="checkbox" id="soil" checked> <label for="soil">Soil-based</label></div>
        </div>
        <div class="panel-section">
            <div class="panel-title"><i class="fa-regular fa-hourglass"></i> Time range</div>
            <div>
                <span class="time-option active" data-time="6h">6h</span>
                <span class="time-option" data-time="24h">24h</span>
                <span class="time-option" data-time="72h">72h</span>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-title"><i class="fa-regular fa-layer-group"></i> Legend</div>
            <div style="display:flex; flex-direction:column; gap:6px; font-size:0.85rem;">
                <span><span style="background:#3ba86d; width:14px; height:14px; display:inline-block; border-radius:4px;"></span> Safe (0-30)</span>
                <span><span style="background:#f5b342; width:14px; height:14px; display:inline-block; border-radius:4px;"></span> Watch (31-55)</span>
                <span><span style="background:#f57c32; width:14px; height:14px; display:inline-block; border-radius:4px;"></span> Alert (56-75)</span>
                <span><span style="background:#d64034; width:14px; height:14px; display:inline-block; border-radius:4px;"></span> Critical (76-100)</span>
            </div>
        </div>
        <div style="font-size:0.8rem; color:#4f7ca5; margin-top:16px;"><i class="fa-regular fa-circle-info"></i> Data dari edge AI, bukan klinis</div>
    </div>

    <!-- CRITICAL ALERT BANNER (muncul jika ada zona merah) -->
    <div class="alert-banner" id="criticalBanner">
        <i class="fa-regular fa-triangle-exclamation"></i> Critical risk detected – Shelter Zone A · immediate review
        <i class="fa-regular fa-arrow-right"></i>
    </div>

    <!-- Leaflet map initialization -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        
        (function() {
            // inisialisasi map (pusat dummy: wilayah bencana)
            const map = L.map('map').setView([-7.2575, 112.7521], 13); // sekitar Surabaya (contoh)

            // basemap (satelit / jalan)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap, CartoDB'
            }).addTo(map);

            // layer groups
            const heatLayer = L.layerGroup().addTo(map);
            const nodeLayer = L.layerGroup().addTo(map);
            const shelterLayer = L.layerGroup().addTo(map);

            // dummy data risk heatmap (lingkaran2 heat)
            function generateHeatDummy() {
                const center = [-7.2575, 112.7521];
                const points = [
                    { lat: -7.247, lng: 112.745, intensity: 0.8 }, // critical alert
                    { lat: -7.262, lng: 112.760, intensity: 0.6 },
                    { lat: -7.272, lng: 112.740, intensity: 0.4 },
                    { lat: -7.245, lng: 112.770, intensity: 0.3 },
                    { lat: -7.280, lng: 112.755, intensity: 0.7 },
                ];
                points.forEach(p => {
                    const circle = L.circle([p.lat, p.lng], {
                        radius: 200,
                        color: p.intensity > 0.7 ? '#d64034' : (p.intensity > 0.5 ? '#f57c32' : (p.intensity > 0.3 ? '#f5b342' : '#3ba86d')),
                        fillOpacity: 0.5,
                        weight: 0,
                        fill: true,
                    }).bindTooltip(`Environmental Risk Index: ${Math.round(p.intensity*100)} (${p.intensity>0.7?'Critical':p.intensity>0.5?'Alert':p.intensity>0.3?'Watch':'Safe'})`);
                    heatLayer.addLayer(circle);
                });
            }

            // dummy nodes GAIATRI risk filter time
            function generateNodes() {
                const nodes = [
                    { lat: -7.250, lng: 112.748, id: 'G7A-21F', status: 'Alert', risk: 68, bio: [42,48,56,64,62,58], water: 54, solar: 78, tio2: 'Active' },
                    { lat: -7.265, lng: 112.762, id: 'G4B-12C', status: 'Watch', risk: 44, bio: [32,36,40,42,44,41], water: 38, solar: 82, tio2: 'Active' },
                    { lat: -7.278, lng: 112.733, id: 'G9X-33A', status: 'Normal', risk: 27, bio: [22,20,25,23,28,25], water: 19, solar: 91, tio2: 'Active' },
                    { lat: -7.235, lng: 112.770, id: 'G2D-99K', status: 'Critical', risk: 81, bio: [66,72,78,84,82,88], water: 79, solar: 45, tio2: 'Active' },
                ];
                nodes.forEach(n => {
                    const color = n.status === 'Critical' ? '#d64034' : (n.status === 'Alert' ? '#f57c32' : (n.status === 'Watch' ? '#f5b342' : '#3ba86d'));
                    const icon = L.divIcon({
                        html: `<div style="background:${color}; width:20px; height:20px; border-radius:6px; border:3px solid white; box-shadow:0 4px 10px black;"></div>`,
                        className: 'custom-node-icon',
                        iconSize: [20,20]
                    });
                    const marker = L.marker([n.lat, n.lng], { icon }).addTo(nodeLayer);
                    marker.bindPopup(`
                        <div class="node-popup">
                            <div class="popup-header"><i class="fa-regular fa-microchip"></i> ${n.id}</div>
                            <div class="popup-row"><span>📍 Lokasi</span> <span>Shelter A</span></div>
                            <div class="popup-row"><span>🕒 Update</span> <span>22 Feb 14:30</span></div>
                            <div class="popup-row"><span>📊 Bioaerosol</span> <span class="spark">${n.bio.map(v=>'<span style="height:'+ (v/12) +'px;"></span>').join('')}</span></div>
                            <div class="popup-row"><span>💧 Water index</span> <span>${n.water}</span></div>
                            <div class="popup-row"><span>⚙️ GFET</span> <span>OK</span></div>
                            <div class="popup-row"><span>☀️ Solar</span> <span>${n.solar}%</span></div>
                            <div class="popup-row"><span>🦠 TiO₂</span> <span>${n.tio2}</span></div>
                            <div class="popup-footer">
                                <div class="popup-btn" onclick="alert('Device detail ${n.id}')">🔍 Device</div>
                                <div class="popup-btn" onclick="alert('Analytics ${n.id}')">📈 Analytics</div>
                            </div>
                        </div>
                    `, { minWidth: 260 });
                });
            }

            // shelter & facility dummy
            function generateShelters() {
                const shelters = [
                    { lat: -7.252, lng: 112.750, name: 'Shelter A', occupants: 320, risk: 'Alert' },
                    { lat: -7.270, lng: 112.765, name: 'Shelter B', occupants: 180, risk: 'Watch' },
                    { lat: -7.230, lng: 112.745, name: 'Poskesdar', occupants: 45, risk: 'Safe' },
                    { lat: -7.282, lng: 112.730, name: 'Shelter C', occupants: 210, risk: 'Critical' },
                ];
                shelters.forEach(s => {
                    const icon = L.divIcon({
                        html: `<i class="fa-solid fa-tent" style="font-size:24px; color:${s.risk==='Critical'?'#d64034':s.risk==='Alert'?'#f57c32':s.risk==='Watch'?'#f5b342':'#3ba86d'}; text-shadow:0 2px 6px black;"></i>`,
                        className: 'shelter-icon',
                        iconSize: [30,30]
                    });
                    const marker = L.marker([s.lat, s.lng], { icon }).addTo(shelterLayer);
                    marker.bindTooltip(`${s.name} · ${s.occupants} jiwa · risk ${s.risk}`);
                });
            }

            // generate semua layer dummy
            generateHeatDummy();
            generateNodes();
            generateShelters();

            // layer toggle buttons
            const btnHeat = document.getElementById('btnHeatmap');
            const btnNodes = document.getElementById('btnNodes');
            const btnShelters = document.getElementById('btnShelters');

            btnHeat.addEventListener('click', () => {
                btnHeat.classList.add('active'); btnNodes.classList.remove('active'); btnShelters.classList.remove('active');
                map.removeLayer(nodeLayer); map.removeLayer(shelterLayer); map.addLayer(heatLayer);
            });
            btnNodes.addEventListener('click', () => {
                btnNodes.classList.add('active'); btnHeat.classList.remove('active'); btnShelters.classList.remove('active');
                map.removeLayer(heatLayer); map.removeLayer(shelterLayer); map.addLayer(nodeLayer);
            });
            btnShelters.addEventListener('click', () => {
                btnShelters.classList.add('active'); btnHeat.classList.remove('active'); btnNodes.classList.remove('active');
                map.removeLayer(nodeLayer); map.removeLayer(heatLayer); map.addLayer(shelterLayer);
            });

            // filter dummy (checkbox hanya simulasi)
            document.querySelectorAll('.filter-item input').forEach(cb => {
                cb.addEventListener('change', () => alert('Filter risiko di-update (dummy)'));
            });

            // time range selector
            document.querySelectorAll('.time-option').forEach(el => {
                el.addEventListener('click', function() {
                    document.querySelectorAll('.time-option').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    swal("Success", "Time Option berhasil diubah", "success", {
                      button: "Oke",

                    });
                });
            });

            // alert banner klik → buka early warning (dummy)
            document.getElementById('criticalBanner').addEventListener('click', () => {
                alert('Membuka Early Warning Response Panel (dummy)');
            });

            // tambahkan titik genangan (hazard) jika diperlukan, tapi cukup untuk demo

            // side panel bisa ditutup? di prototype tetap terbuka

            // zoom ke area kritis? kita set view ke marker merah (node critical)
            const criticalNode = [-7.235, 112.770];
            L.popup({ closeButton: false, autoClose: false })
                .setLatLng(criticalNode)
                .setContent('<b style="color:#b14030;">🔴 Critical risk zone</b>')
                .openOn(map);
        })();
    </script>

    <!-- fallback untuk fungsi alert dari popup -->
    <script>
        function viewDeviceDetail(id) { alert('Device detail: ' + id); }
    </script>
</body>
</html>
